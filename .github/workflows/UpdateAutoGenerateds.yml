name: Daily Download Telemetry

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  track-downloads:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Download Tracker
        shell: pwsh
        env:
          # Automatically mounts the temporary token provided by GitHub into your environment
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Executes your script using the project parameters
          ./.github/scripts/DownloadDataSaver.ps1 -RepoOwner "DeCEll-1" -RepoName "CustomizablePhaseGlow"

      - name: Commit and Push Updated Telemetry
        shell: pwsh
        run: |
          # Check if git detects any modifications in the targeted path
          $gitStatus = git status --porcelain ./AutoGenerated/download_data.json
          
          if ($gitStatus) {
              Write-Host "New telemetry data found. Committing changes..."
              
              # Standard GitHub Actions bot identity configuration
              git config --global user.name "github-actions[bot]"
              git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
              
              # Stage, commit, and push back to the branch
              git add ./AutoGenerated/download_data.json
              git commit -m "stats: daily total download update [skip ci]"
              git push
          } else {
              Write-Host "Download metrics are unchanged since the last check. Skipping commit."
          }